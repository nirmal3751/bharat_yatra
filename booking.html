<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Journey | Bharat Yatra</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-blue: #001b94; /* Professional Indigo Blue */
            --bg-body: #f2f5f8;
            --text-main: #1a202c;
            --border-light: #e2e8f0;
        }

        body {
            background: var(--bg-body);
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* 🟢 CLEAN MINIMAL NAVBAR */
        .nav-header {
            background: white;
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-text { 
            font-size: 1.1rem; 
            font-weight: 700; 
            color: var(--brand-blue); 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn-home {
            text-decoration: none; font-size: 0.85rem; font-weight: 600;
            color: var(--brand-blue); background: #f0f4ff;
            padding: 8px 18px; border-radius: 6px; transition: 0.2s;
        }
        .btn-home:hover { background: var(--brand-blue); color: white; }

        /* 🟦 MAIN WRAPPER */
        .main-container {
            max-width: 1100px;
            margin: 50px auto;
            padding: 0 20px;
        }

        /* TAGLINE */
        .booking-intro {
            margin-bottom: 25px;
        }
        .booking-intro p {
            font-size: 0.95rem;
            color: #64748b;
            font-weight: 500;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 📋 THE CORPORATE BOOKING CARD */
        .booking-card {
            background: white;
            border-radius: 8px; /* Clean edges, not too round */
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 40px;
            border: 1px solid var(--border-light);
        }

        /* TABS (Airline Style) */
        .tabs-nav {
            display: flex; gap: 35px; margin-bottom: 30px; border-bottom: 1px solid #edf2f7;
        }
        .tab-item {
            background: none; border: none; padding: 12px 5px; cursor: pointer;
            font-size: 1rem; font-weight: 600; color: #718096; position: relative;
            display: flex; align-items: center; gap: 10px; transition: 0.2s;
        }
        .tab-item.active { color: var(--brand-blue); }
        .tab-item.active::after {
            content: ''; position: absolute; bottom: -1px; left: 0; width: 100%;
            height: 3px; background: var(--brand-blue);
        }

        /* FORM GRID */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .field-group { display: flex; flex-direction: column; gap: 8px; }
        .field-group label { font-size: 0.75rem; font-weight: 700; color: #4a5568; text-transform: uppercase; }

        .input-box {
            position: relative; border: 1px solid #cbd5e0;
            border-radius: 6px; transition: 0.2s; background: #fff;
        }
        .input-box:focus-within { border-color: var(--brand-blue); box-shadow: 0 0 0 3px rgba(0,27,148,0.05); }
        
        .input-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #a0aec0; }
        .input-box input {
            width: 100%; border: none; outline: none; padding: 14px 15px 14px 45px;
            font-size: 1rem; font-weight: 500; color: var(--text-main); background: transparent;
            box-sizing: border-box;
        }

        /* 🚀 THE ACTION BUTTON */
        .btn-search {
            width: 100%; background: var(--brand-blue); color: white;
            border: none; border-radius: 6px; padding: 18px;
            font-size: 1.1rem; font-weight: 700; cursor: pointer;
            margin-top: 30px; transition: 0.2s;
        }
        .btn-search:hover { background: #00147a; box-shadow: 0 4px 12px rgba(0,27,148,0.2); }

        .tab-pane { display: none; }
        .tab-pane.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        footer { text-align: center; margin-top: 50px; color: #94a3b8; font-size: 0.85rem; padding-bottom: 30px; }
    </style>
</head>
<body>

<nav class="nav-header">
    <div class="logo-text">BHARAT YATRA</div>
    <a href="index.html" class="btn-home">
        <i class="fas fa-home"></i> Home
    </a>
</nav>

<div class="main-container">
    <div class="booking-intro">
        <p>Premium Travel Solutions for Your Next Destination</p>
    </div>

    <div class="booking-card">
        <div class="tabs-nav">
            <button class="tab-item active" onclick="switchTab(event, 'flights')"><i class="fas fa-plane"></i> Flights</button>
            <button class="tab-item" onclick="switchTab(event, 'trains')"><i class="fas fa-train"></i> Trains</button>
        </div>

        <div id="flights" class="tab-pane active">
            <form onsubmit="handleSearch(event, 'Flight')">
                <div class="form-grid">
                    <div class="field-group">
                        <label>Origin</label>
                        <div class="input-box">
                            <i class="fas fa-map-marker-alt"></i>
                            <input type="text" placeholder="From City" required>
                        </div>
                    </div>
                    <div class="field-group">
                        <label>Destination</label>
                        <div class="input-box">
                            <i class="fas fa-plane-arrival"></i>
                            <input type="text" placeholder="To City" required>
                        </div>
                    </div>
                    <div class="field-group">
                        <label>Travel Date</label>
                        <div class="input-box">
                            <i class="fas fa-calendar-alt"></i>
                            <input type="date" required>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn-search">Search Flights</button>
            </form>
        </div>

        <div id="trains" class="tab-pane">
            <form onsubmit="handleSearch(event, 'Train')">
                <div class="form-grid">
                    <div class="field-group">
                        <label>From Station</label>
                        <div class="input-box">
                            <i class="fas fa-train"></i>
                            <input type="text" placeholder="Source" required>
                        </div>
                    </div>
                    <div class="field-group">
                        <label>To Station</label>
                        <div class="input-box">
                            <i class="fas fa-map-pin"></i>
                            <input type="text" placeholder="Destination" required>
                        </div>
                    </div>
                    <div class="field-group">
                        <label>Date</label>
                        <div class="input-box">
                            <i class="fas fa-calendar-day"></i>
                            <input type="date" required>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn-search">Search Trains</button>
            </form>
        </div>
    </div>
    
    <footer>
        &copy; 2026 Bharat Yatra Travel Agency Ltd. | Trusted & Secure Booking
    </footer>
</div>

<script>
    function switchTab(evt, tabName) {
        let i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-pane");
        for (i = 0; i < tabcontent.length; i++) { tabcontent[i].style.display = "none"; }
        tablinks = document.getElementsByClassName("tab-item");
        for (i = 0; i < tablinks.length; i++) { tablinks[i].className = tablinks[i].className.replace(" active", ""); }
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }

    function handleSearch(e, type) {
        e.preventDefault();
        const inputs = e.target.querySelectorAll('input');
        const from = inputs[0].value.trim();
        const to = inputs[1].value.trim();
        const date = inputs[2].value;

        if (type === 'Flight') {
            window.open(`https://www.skyscanner.co.in/transport/flights/${from}/${to}/${date}`, '_blank');
        } else {
            const d = new Date(date);
            const formattedDate = `${("0" + d.getDate()).slice(-2)}-${("0" + (d.getMonth() + 1)).slice(-2)}-${d.getFullYear()}`;
            window.open(`https://www.confirmtkt.com/train-running-status/${from}-to-${to}?date=${formattedDate}`, '_blank');
        }
    }
</script>

</body>
</html>
