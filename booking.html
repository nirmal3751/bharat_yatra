<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Journey - Bharat Yatra</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Internal CSS for Booking Page Layout */
        body {
            background: #f0f2f5;
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        /* 1. Navbar Adjustments */
        .navbar {
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-weight: 800; color: #ff5722; font-size: 1.4rem; }

        /* 2. Hero Section */
        .booking-hero {
            background: linear-gradient(45deg, #1a2a6c, #b21f1f, #fdbb2d);
            padding: 80px 5% 120px;
            text-align: center;
            color: white;
        }

        .booking-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 3rem); /* Responsive Font */
            margin-bottom: 10px;
        }

        /* 3. Main Container */
        .booking-main-container {
            max-width: 900px;
            width: 90%;
            margin: -60px auto 50px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
            padding: 30px;
            box-sizing: border-box;
        }

        .booking-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .tab-btn {
            background: none; border: none; font-size: 1.1rem;
            font-weight: 600; color: #777; cursor: pointer;
            display: flex; align-items: center; gap: 10px;
            transition: 0.3s; padding-bottom: 10px;
        }

        .tab-btn.active { color: #ff5722; border-bottom: 3px solid #ff5722; }
        .tab-btn.train-tab.active { color: #2196f3; border-bottom: 3px solid #2196f3; }

        /* 4. ⭐ Form Grid Fix ⭐ */
        .booking-form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-weight: 600; font-size: 0.9rem; color: #333; }
        .input-group input {
            padding: 14px; border: 1.5px solid #ddd;
            border-radius: 10px; font-size: 1rem; outline: none;
        }

        .book-now-button {
            width: 100%; margin-top: 30px; padding: 18px;
            border: none; border-radius: 12px; font-size: 1.1rem;
            font-weight: 700; color: white; cursor: pointer; transition: 0.3s;
        }

        .flight-btn { background: #ff5722; }
        .train-btn { background: #2196f3; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        footer { text-align: center; padding: 20px; color: #777; font-size: 0.9rem; }

        /* --- Mobile Specific Overrides (In-page) --- */
        @media (max-width: 600px) {
            .booking-main-container { padding: 20px; margin-top: -40px; }
            .booking-form-grid { display: flex; flex-direction: column; }
            .navbar ul { display: none; }
            .booking-hero { padding: 60px 20px 80px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">BHARAT YATRA</div>
    <button class="login-btn" style="background:#007bff; color:white; border-radius:20px; padding:8px 20px; border:none; cursor:pointer;" onclick="location.href='index.html'">Go Back</button>
</nav>

<section class="booking-hero">
    <h1>Ab Manzil Dur Nahi!</h1>
    <p>Bharat Yatra ke sath apni Flight aur Train ticket turant book karein.</p>
</section>

<div class="booking-main-container">
    <div class="booking-tabs">
        <button class="tab-btn active flight-tab" onclick="openBookingTab(event, 'flight-sec')">
            <i class="fas fa-plane"></i> Flights
        </button>
        <button class="tab-btn train-tab" onclick="openBookingTab(event, 'train-sec')">
            <i class="fas fa-train"></i> Trains
        </button>
    </div>

    <div id="flight-sec" class="tab-content active">
        <form onsubmit="handleRealBooking(event, 'Flight')">
            <div class="booking-form-grid">
                <div class="input-group">
                    <label>From (Departure City)</label>
                    <input type="text" placeholder="e.g. Mumbai" required>
                </div>
                <div class="input-group">
                    <label>To (Destination City)</label>
                    <input type="text" placeholder="e.g. Delhi" required>
                </div>
                <div class="input-group">
                    <label>Departure Date</label>
                    <input type="date" required>
                </div>
            </div>
            <button type="submit" class="book-now-button flight-btn">Search Flights on Skyscanner</button>
        </form>
    </div>

    <div id="train-sec" class="tab-content">
        <form onsubmit="handleRealBooking(event, 'Train')">
            <div class="booking-form-grid">
                <div class="input-group">
                    <label>Source Station</label>
                    <input type="text" placeholder="e.g. Sehore" required>
                </div>
                <div class="input-group">
                    <label>Destination Station</label>
                    <input type="text" placeholder="e.g. Bhopal" required>
                </div>
                <div class="input-group">
                    <label>Travel Date</label>
                    <input type="date" required>
                </div>
            </div>
            <button type="submit" class="book-now-button train-btn">Find Trains on ConfirmTkt</button>
        </form>
    </div>
</div>

<footer>
    <p>Bharat Yatra &copy; 2026 | Safe & Secure Bookings by Nirmal Rajput</p>
</footer>

<script>
    function openBookingTab(evt, tabId) {
        let contents = document.getElementsByClassName("tab-content");
        for (let i = 0; i < contents.length; i++) contents[i].classList.remove("active");
        
        let buttons = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < buttons.length; i++) buttons[i].classList.remove("active");
        
        document.getElementById(tabId).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function handleRealBooking(event, type) {
        event.preventDefault();
        const inputs = event.target.querySelectorAll('input');
        const from = inputs[0].value.trim();
        const to = inputs[1].value.trim();
        const date = inputs[2].value;

        if (type === 'Flight') {
            window.open(`https://www.skyscanner.co.in/transport/flights/${from}/${to}/${date}`, '_blank');
        } else {
            const d = new Date(date);
            const formattedDate = `${("0" + d.getDate()).slice(-2)}-${("0" + (d.getMonth() + 1)).slice(-2)}-${d.getFullYear()}`;
            window.open(`https://www.confirmtkt.com/train-running-status/${from}-to-${to}?date=${formattedDate}`, '_blank');
        }
    }
</script>

</body>
</html>
