<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bharat Yatra | Login</title>

<link rel="stylesheet" href="css/login.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ===== BHARAT YATRA BACKGROUND ===== */
body{
margin:0;
padding:0;
font-family:'Poppins',sans-serif;

background: linear-gradient(
135deg,
#0f172a,
#1e293b,
#0f172a
);

height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}


/* ===== CARD ===== */
.auth-container{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(20px);
padding:40px;
border-radius:20px;
width:90%;
max-width:420px;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 20px 60px rgba(0,0,0,0.5);
text-align:center;
position:relative;
}


/* ===== LOGO ===== */
.brand-logo{
font-size:24px;
font-weight:700;
letter-spacing:2px;
color:#ff6b35;
margin-bottom:8px;
}

.brand-tag{
font-size:12px;
color:rgba(255,255,255,0.6);
margin-bottom:25px;
}


/* ===== FORMS ===== */
.form-box{
display:none;
animation:fade .3s ease;
}

.form-box.active{
display:block;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

h2{
font-size:18px;
font-weight:500;
margin-bottom:20px;
}


/* ===== INPUT ===== */
.input-wrapper{
position:relative;
margin-bottom:16px;
text-align:left;
}

.input-wrapper i{
position:absolute;
left:15px;
top:14px;
color:#ff6b35;
}

.input-wrapper input{
width:100%;
padding:12px 12px 12px 40px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.1);
background:rgba(255,255,255,0.05);
color:white;
outline:none;
}

.input-wrapper input:focus{
border-color:#ff6b35;
background:rgba(255,255,255,0.08);
}


/* ===== BUTTON ===== */
.btn-auth{
width:100%;
padding:12px;
border:none;
border-radius:10px;

background: linear-gradient(
45deg,
#ff6b35,
#ff8c42
);

color:white;
font-weight:600;
cursor:pointer;
transition:.3s;
margin-top:5px;
}

.btn-auth:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(255,107,53,0.4);
}


/* ===== FOOTER ===== */
.auth-footer{
margin-top:20px;
font-size:13px;
color:rgba(255,255,255,0.6);
}

.auth-footer span{
color:#ff6b35;
cursor:pointer;
font-weight:600;
}


/* ===== BACK BUTTON ===== */
.back-link{
position:absolute;
top:25px;
left:25px;
color:white;
text-decoration:none;
font-size:14px;
opacity:.7;
}

.back-link:hover{
opacity:1;
}

</style>

</head>
<body>

<a href="index.html" class="back-link">
<i class="fas fa-arrow-left"></i> Back
</a>

<div class="auth-container">

<div class="brand-logo">BHARAT YATRA</div>
<div class="brand-tag">Explore Incredible India</div>


<!-- LOGIN -->
<div id="login-box" class="form-box active">

<h2>Welcome Back</h2>

<form onsubmit="handleAuth(event)">

<div class="input-wrapper">
<i class="fas fa-envelope"></i>
<input type="email" placeholder="Email address" required>
</div>

<div class="input-wrapper">
<i class="fas fa-lock"></i>
<input type="password" placeholder="Password" required>
</div>

<button class="btn-auth">Login</button>

</form>

<div class="auth-footer">
Don't have account?
<span onclick="toggleAuth('register-box')">Register</span>
</div>

</div>



<!-- REGISTER -->
<div id="register-box" class="form-box">

<h2>Create Account</h2>

<form onsubmit="handleAuth(event)">

<div class="input-wrapper">
<i class="fas fa-user"></i>
<input type="text" placeholder="Full Name" required>
</div>

<div class="input-wrapper">
<i class="fas fa-envelope"></i>
<input type="email" placeholder="Email" required>
</div>

<div class="input-wrapper">
<i class="fas fa-phone"></i>
<input type="tel" placeholder="Phone" required>
</div>

<div class="input-wrapper">
<i class="fas fa-lock"></i>
<input type="password" placeholder="Password" required>
</div>

<button class="btn-auth">Create Account</button>

</form>

<div class="auth-footer">
Already have account?
<span onclick="toggleAuth('login-box')">Login</span>
</div>

</div>

</div>


<script>

function toggleAuth(id){
document.querySelectorAll(".form-box")
.forEach(box=>box.classList.remove("active"));

document.getElementById(id).classList.add("active");
}

function handleAuth(e){
e.preventDefault();
window.location.href="index.html";
}

</script>

</body>
</html>
